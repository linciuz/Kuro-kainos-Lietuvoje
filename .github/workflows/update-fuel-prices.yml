name: Update fuel prices

on:
  schedule:
    # Daily FULL refresh: prices PLUS the heavy chain-directory + EV-charger
    # fetches (which change rarely, so once/twice a day is enough). Frequent
    # price-only refreshes live in update-prices.yml. Offset from that workflow's
    # :15 slots; the shared concurrency group serializes them regardless. UTC.
    - cron: "45 5 * * 1-5"    # ~08:45 Lithuania (morning full refresh)
    - cron: "45 13 * * 1-5"   # ~16:45 Lithuania (afternoon, refreshes directories)
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write

# Shared with update-prices.yml so the two never push simultaneously.
concurrency:
  group: kk-data-write
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch latest prices
        run: python scripts/fetch_prices.py || echo "LEA fetch failed (non-fatal) — keeping last prices"

      - name: Snapshot daily national price for the history trend
        run: python scripts/append_history.py || echo "history snapshot failed (non-fatal)"

      - name: Add full station list from LEA Power BI (price-less registry stations)
        run: python scripts/fetch_lea_powerbi.py || echo "Power BI fetch failed (non-fatal)"

      - name: Geocode stations (cached; only new addresses hit Nominatim)
        run: python scripts/geocode.py

      - name: Collect chain station directories (exact coords)
        run: python scripts/fetch_chain_stations.py || echo "chain directory fetch failed (non-fatal)"

      - name: Collect EV charging stations (OpenStreetMap)
        run: python scripts/fetch_ev_chargers.py || echo "EV charger fetch failed (non-fatal)"

      - name: Snap LEA stations onto exact chain coordinates
        run: python scripts/merge_chain_coords.py || echo "merge failed (non-fatal)"

      - name: Fetch independent sources (Circle K)
        run: python scripts/fetch_circlek.py || echo "Circle K fetch failed (non-fatal)"

      - name: Fetch Orlen wholesale reference
        run: python scripts/fetch_orlen_wholesale.py || echo "Orlen wholesale fetch failed (non-fatal)"

      - name: Compare sources vs LEA -> discrepancies.json
        run: python scripts/compare.py

      - name: Fetch Brent oil price + weekly trend
        run: python scripts/fetch_oil.py || echo "oil fetch failed (non-fatal)"

      - name: Fetch LT electricity market price
        run: python scripts/fetch_electricity.py || echo "electricity fetch failed (non-fatal)"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stations.json data/_debug_headers.json data/geocode_cache.json data/sources/circlek.json data/sources/chain_stations.json data/sources/orlen_wholesale.json data/sources/ev_chargers.json data/sources/lea_powerbi.json data/discrepancies.json data/oil.json data/electricity.json data/price_history.json || true
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Update fuel prices ($(date -u +%Y-%m-%d))"
            # Publish with retries; on a data conflict prefer this run's fresh
            # regeneration (-X theirs). Fail loudly if it truly can't push.
            for i in 1 2 3 4 5; do
              if git fetch origin main && git rebase -X theirs origin/main && git push; then
                echo "published (attempt $i)"; exit 0
              fi
              echo "publish attempt $i failed — retrying"
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 8 + 3))
            done
            echo "::error::failed to publish updated data after 5 attempts"; exit 1
          fi
