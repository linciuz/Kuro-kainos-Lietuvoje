name: Update fuel prices

on:
  schedule:
    # LEA publishes by 10:00 local (07:00 UTC in summer). GitHub's scheduler is
    # best-effort and often delays/SKIPS runs, so fire several times through the
    # day; the commit step is idempotent (only commits when data actually
    # changed), so the extra attempts are free insurance. Times are UTC.
    - cron: "15 8 * * 1-5"    # ~11:15 LT
    - cron: "15 11 * * 1-5"   # ~14:15 LT (retry if the morning slot was skipped)
    - cron: "15 15 * * 1-5"   # ~18:15 LT (last-chance retry)
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch latest prices
        run: python scripts/fetch_prices.py

      - name: Geocode stations (cached; only new addresses hit Nominatim)
        run: python scripts/geocode.py

      - name: Collect chain station directories (exact coords)
        run: python scripts/fetch_chain_stations.py || echo "chain directory fetch failed (non-fatal)"

      - name: Collect EV charging stations (OpenStreetMap)
        run: python scripts/fetch_ev_chargers.py || echo "EV charger fetch failed (non-fatal)"

      - name: Snap LEA stations onto exact chain coordinates
        run: python scripts/merge_chain_coords.py || echo "merge failed (non-fatal)"

      - name: Fetch independent sources (Circle K)
        run: python scripts/fetch_circlek.py || echo "Circle K fetch failed (non-fatal)"

      - name: Fetch Orlen wholesale reference
        run: python scripts/fetch_orlen_wholesale.py || echo "Orlen wholesale fetch failed (non-fatal)"

      - name: Compare sources vs LEA -> discrepancies.json
        run: python scripts/compare.py

      - name: Fetch Brent oil price + weekly trend
        run: python scripts/fetch_oil.py || echo "oil fetch failed (non-fatal)"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stations.json data/_debug_headers.json data/geocode_cache.json data/sources/circlek.json data/sources/chain_stations.json data/sources/orlen_wholesale.json data/sources/ev_chargers.json data/discrepancies.json data/oil.json || true
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Update fuel prices ($(date -u +%Y-%m-%d))"
            git push
          fi
