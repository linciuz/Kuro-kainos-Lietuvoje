name: Update fuel prices

on:
  schedule:
    # 08:15 UTC = ~11:15 in Lithuania (summer). LEA publishes by 10:00 local.
    # Mon-Fri only (stations report on working days).
    - cron: "15 8 * * 1-5"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch latest prices
        run: python scripts/fetch_prices.py

      - name: Geocode stations (cached; only new addresses hit Nominatim)
        run: python scripts/geocode.py

      - name: Fetch independent sources (Circle K)
        run: python scripts/fetch_circlek.py || echo "Circle K fetch failed (non-fatal)"

      - name: Compare sources vs LEA -> discrepancies.json
        run: python scripts/compare.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stations.json data/_debug_headers.json data/geocode_cache.json data/sources/circlek.json data/discrepancies.json || true
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Update fuel prices ($(date -u +%Y-%m-%d))"
            git push
          fi
