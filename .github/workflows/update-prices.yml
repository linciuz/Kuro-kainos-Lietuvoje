name: Update prices (frequent)

# Fast-changing PRICE data only (no heavy chain/EV directory fetches — those run
# once a day in update-fuel-prices.yml). Runs HOURLY through the Lithuanian
# morning so we grab LEA's once-a-day file within ~1h of it being published
# (and survive GitHub's flaky scheduler), then a couple of afternoon refreshes.
#
# GitHub cron is UTC-only. Lithuania is UTC+3 (summer) / UTC+2 (winter), so the
# 04:15-10:15 UTC band = ~06:15-13:15 local, covering the 7-12 LT morning in
# both seasons. LEA publishes on working days, so Mon-Fri.
on:
  schedule:
    # Two morning updates land at DIFFERENT times, so poll the whole morning:
    #  - ORLEN's wholesale point (yesterday's SETTLED price) posts EARLY, well
    #    before 10:00 — no reason to wait for the LEA window to refresh it.
    #  - LEA's retail file publishes ~10:00 Lithuania.
    # Every 15 min catches Orlen's fresh point the moment it posts AND LEA within
    # ~15 min, and survives GitHub's flaky scheduler (many redundant slots). A
    # run where nothing changed just skips the commit, so extra slots are cheap.
    #   */15 3-9 UTC = 06:00-12:59 (summer, UTC+3) / 05:00-11:59 (winter, UTC+2)
    - cron: "*/15 3-9 * * 1-5"  # every 15 min across the whole LT morning
    - cron: "15 11 * * 1-5"     # ~14:15 LT (early-afternoon catch-all)
    - cron: "15 14 * * 1-5"     # ~17:15 Lithuania
    - cron: "15 19 * * 1-5"     # ~22:15 Lithuania
  workflow_dispatch: {}

permissions:
  contents: write

# Serialize with the daily full run so the two never push at the same time.
concurrency:
  group: kk-data-write
  cancel-in-progress: false

jobs:
  prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r scripts/requirements.txt

      # LEA daily prices. Non-fatal: if the SharePoint file is briefly down, we
      # keep the last stations.json and still refresh the other sources below.
      - name: Fetch LEA prices
        run: python scripts/fetch_prices.py || echo "LEA fetch failed (non-fatal) — keeping last prices"
      - name: Snapshot daily national price for the history trend
        run: python scripts/append_history.py || echo "history snapshot failed (non-fatal)"
      - name: Re-add full station list (price-less registry stations, from committed cache)
        run: python scripts/fetch_lea_powerbi.py --merge-only || echo "merge failed (non-fatal)"
      - name: Geocode new stations (cached)
        run: python scripts/geocode.py || echo "geocode failed (non-fatal)"
      - name: Snap onto exact chain coords (uses last daily directory)
        run: python scripts/merge_chain_coords.py || echo "merge failed (non-fatal)"
      - name: Circle K live prices
        run: python scripts/fetch_circlek.py || echo "Circle K failed (non-fatal)"
      - name: Orlen wholesale reference
        run: python scripts/fetch_orlen_wholesale.py || echo "Orlen failed (non-fatal)"
      - name: Compare sources vs LEA -> discrepancies
        run: python scripts/compare.py || echo "compare failed (non-fatal)"
      - name: Brent oil price + weekly trend
        run: python scripts/fetch_oil.py || echo "oil failed (non-fatal)"
      - name: LT electricity market price
        run: python scripts/fetch_electricity.py || echo "electricity failed (non-fatal)"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stations.json data/geocode_cache.json data/sources/circlek.json data/sources/orlen_wholesale.json data/discrepancies.json data/oil.json data/electricity.json data/price_history.json || true
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Update prices ($(date -u +%Y-%m-%dT%H:%MZ))"
            # Publish with retries; on a data conflict prefer this run's fresh
            # regeneration (-X theirs). Fail loudly if it truly can't push.
            for i in 1 2 3 4 5; do
              if git fetch origin main && git rebase -X theirs origin/main && git push; then
                echo "published (attempt $i)"; exit 0
              fi
              echo "publish attempt $i failed — retrying"
              git rebase --abort 2>/dev/null || true
              sleep $((RANDOM % 8 + 3))
            done
            echo "::error::failed to publish updated data after 5 attempts"; exit 1
          fi
