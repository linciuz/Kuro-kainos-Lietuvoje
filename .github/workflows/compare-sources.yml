name: Compare sources (intraday)

# The LEA file is the official 10:00 baseline (refreshed by update-fuel-prices.yml).
# Chains like Circle K change prices during the day, so we re-scrape the live
# sources every couple of hours and re-flag any station whose chain price has
# moved away from the 10:00 baseline -> data/discrepancies.json.

on:
  schedule:
    - cron: "0 7-17/2 * * 1-5"   # every 2h, ~10:00-20:00 Lithuania, Mon-Fri
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: compare-sources
  cancel-in-progress: true

jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r scripts/requirements.txt

      - name: Fetch Circle K live prices
        run: python scripts/fetch_circlek.py || echo "Circle K fetch failed (non-fatal)"

      - name: Compare vs LEA baseline
        run: python scripts/compare.py

      - name: Commit flags if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sources/circlek.json data/discrepancies.json || true
          if git diff --staged --quiet; then
            echo "No change in flags."
          else
            git commit -m "Update price-change flags ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
