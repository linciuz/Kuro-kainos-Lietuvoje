<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Oficialios degalų kainos Lietuvos degalinėse su žemėlapiu ir artimiausiomis kainomis. Duomenys iš Lietuvos energetikos agentūros (LEA).">
    <title>⛽ Kuro Kainos Lietuvoje</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛽</text></svg>">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#007AFF">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Kuro Kainos">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 10px;
        }
        .app-container {
            max-width: 1200px; margin: 0 auto; background: white;
            border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden;
        }
        .controls { padding: 15px; background: white; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 8px; }
        .action-bar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .act-btn {
            padding: 5px 9px; border: 1px solid #d0d0d0; border-radius: 8px; background: #fff;
            cursor: pointer; font-size: 13px; color: #333; line-height: 1;
        }
        .act-btn.on { background: #eef4ff; border-color: #007AFF; color: #0056b3; }
        .act-btn.donate { background: #fff2e0; border-color: #ffcf99; color: #a15b00; font-weight: 600; }
        .lang-switcher { position: relative; }
        .lang-current {
            display: inline-flex; align-items: center; gap: 5px; padding: 5px 9px;
            border: 1px solid #d0d0d0; border-radius: 8px; background: #fff; color: #333;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .lang-menu {
            position: absolute; right: 0; top: 110%; z-index: 1200; background: #fff;
            border: 1px solid #d0d0d0; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.18);
            padding: 4px; min-width: 96px;
        }
        .lang-menu[hidden] { display: none; }
        .lang-menu button {
            display: flex; align-items: center; gap: 7px; width: 100%; padding: 7px 10px;
            border: none; background: none; border-radius: 7px; cursor: pointer;
            font-size: 13px; color: #333; text-align: left; font-weight: 600;
        }
        .lang-menu button:hover, .lang-menu button.active { background: #eef4ff; }
        .fuel-type-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        .fuel-btn {
            padding: 12px 6px; border: 2px solid #007AFF; background: white; color: #007AFF;
            border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600;
        }
        .fuel-btn.active { background: #007AFF; color: white; }
        .fuel-btn.ev { border-color: #1faa4b; color: #1faa4b; }
        .fuel-btn.ev.active { background: #1faa4b; color: white; }

        .view-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .view-btn {
            padding: 10px; border: 1px solid #ddd; background: #f8f9fa; color: #333;
            border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600;
        }
        .view-btn.active { background: #34323e; color: white; border-color: #34323e; }

        .locate-btn {
            width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 10px;
            background: #28a745; color: white; font-size: 14px; font-weight: 700; cursor: pointer;
        }
        .locate-btn.on { background: #0056b3; }
        .locate-btn:disabled { opacity: .7; cursor: default; }

        .filter-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        select, .search-input {
            flex: 1; min-width: 140px; padding: 10px; border: 1px solid #ccc;
            border-radius: 8px; font-size: 14px; background: white;
        }
        .sort-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .sort-label { font-size: 13px; font-weight: 600; color: #333; }
        .sort-btn {
            flex: 1; min-width: 90px; padding: 8px; border: 1px solid #ddd; background: #f8f9fa;
            border-radius: 8px; cursor: pointer; font-size: 13px;
        }
        .sort-btn.active { background: #007AFF; color: white; border-color: #007AFF; }
        .sort-btn:disabled { opacity: .45; cursor: default; }
        .radius-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 10px; }
        .radius-btn {
            flex: 1; min-width: 52px; padding: 8px; border: 1px solid #ddd; background: #f8f9fa;
            border-radius: 8px; cursor: pointer; font-size: 13px;
        }
        .radius-btn.active { background: #28a745; color: white; border-color: #28a745; }

        .summary { background: #f8f9fa; margin: 0 15px 10px; padding: 12px; border-radius: 8px; }
        .summary-title { font-size: 12px; color: #666; margin-bottom: 8px; text-align: center; }
        .summary-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: center; }
        .stat-label { font-size: 11px; color: #666; }
        .stat-value { font-size: 18px; font-weight: bold; }
        .stat-value.lowest { color: #4CAF50; }
        .stat-value.highest { color: #dc3545; }
        .nat-table { width: 100%; border-collapse: collapse; }
        .nat-table th { font-size: 11px; color: #666; font-weight: 600; padding: 4px 6px; }
        .nat-table td { padding: 7px 6px; text-align: center; font-size: 15px; }
        .nat-table th:first-child, .nat-table td:first-child { text-align: left; font-weight: 600; color: #333; font-size: 13px; }
        .nat-table tbody tr { border-top: 1px solid #ececec; }
        .nat-table .lo { color: #1faa4b; font-weight: bold; }
        .nat-table .avg { color: #333; font-weight: bold; }
        .nat-table .hi { color: #dc3545; font-weight: bold; }
        .wholesale-ref {
            margin-top: 10px; padding-top: 8px; border-top: 1px dashed #d8d8d8;
            font-size: 11px; color: #777; text-align: center;
        }
        .wholesale-ref b { color: #555; }

        .stations-container { padding: 0 15px 15px; max-height: 60vh; overflow-y: auto; }
        .count-line { font-size: 12px; color: #888; margin: 6px 2px 10px; }
        .station-card {
            background: white; border: 1px solid #e0e0e0; border-radius: 12px;
            padding: 14px; margin-bottom: 10px;
        }
        .fav-btn {
            float: right; background: none; border: none; font-size: 22px; line-height: 1;
            cursor: pointer; color: #f5b301; padding: 0 0 4px 10px;
        }
        .best-price-badge {
            background: #4CAF50; color: white; padding: 3px 9px; border-radius: 6px;
            font-size: 11px; font-weight: bold; display: inline-block; margin-bottom: 6px;
        }
        .dist-badge {
            background: #eef4ff; color: #0056b3; padding: 3px 9px; border-radius: 6px;
            font-size: 11px; font-weight: bold; display: inline-block; margin-bottom: 6px; margin-left: 6px;
        }
        .station-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
        .station-name { font-size: 17px; font-weight: bold; color: #333; }
        .station-price { font-size: 22px; font-weight: bold; color: #007AFF; white-space: nowrap; }
        .no-price-badge { font-size: 12px; color: #8a8f98; font-weight: 600; white-space: nowrap; }
        .price-unit { font-size: 13px; color: #666; }
        .station-address { color: #666; font-size: 13px; margin: 6px 0 10px; }
        .station-muni { font-size: 12px; color: #888; margin-bottom: 10px; }
        .fuel-chips { display: flex; align-items: center; gap: 5px; margin: 0 0 10px; flex-wrap: wrap; }
        .fuel-chips .lbl { font-size: 11px; color: #888; }
        .fuel-chip {
            font-size: 14px; line-height: 1; padding: 3px 8px; border-radius: 8px;
            background: #eef4ff; border: 1px solid #d6e4ff;
        }
        .fuel-chip.off { background: #f4f4f4; border-color: #ececec; opacity: .4; filter: grayscale(1); }
        .approx-tag {
            font-size: 10px; color: #9a7b00; background: #fff6d6; border: 1px solid #f0e0a0;
            padding: 1px 6px; border-radius: 6px; margin-left: 4px;
        }
        .change-flag {
            font-size: 12px; color: #8a5a00; background: #fff4e0; border: 1px solid #ffd591;
            border-radius: 8px; padding: 6px 9px; margin-bottom: 10px;
        }
        .change-banner {
            background: #fff4e0; color: #8a5a00; border-bottom: 1px solid #ffd591;
            font-size: 12px; padding: 9px 15px; text-align: center;
        }
        #updated-line.stale { color: #b3261e; font-weight: 700; }
        .oil-footer {
            border-top: 1px solid #e0e0e0; font-size: 12px; color: #555;
            padding: 10px 15px; text-align: center; background: #fafbfc;
            display: flex; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap;
        }
        .oil-footer b { color: #333; }
        .oil-ind { font-weight: 700; padding: 2px 8px; border-radius: 6px; }
        .oil-footer.oil-ind-up .oil-ind { color: #b3261e; background: #fdecee; }
        .oil-footer.oil-ind-down .oil-ind { color: #1f7a3d; background: #e9f7ee; }
        .oil-footer.oil-ind-flat .oil-ind { color: #666; background: #eef0f2; }
        .report-line {
            font-size: 12px; color: #4a2f7a; background: #f0ebfb; border: 1px solid #d6c6f0;
            border-radius: 8px; padding: 6px 9px; margin-bottom: 10px;
        }
        .report-row { margin-top: 8px; }
        .report-btn {
            width: 100%; padding: 8px; border: 1px dashed #9b7fd4; background: #f7f3ff;
            color: #4a2f7a; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600;
        }
        .nav-row { display: flex; gap: 8px; }
        .nav-btn {
            flex: 1; text-align: center; text-decoration: none; color: white; border: none;
            padding: 9px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 700;
        }
        .nav-gmaps { background: #1a73e8; color: #fff; }
        .nav-waze { background: #33ccff; color: #06283d; }
        /* Leaflet's .leaflet-container a link colour overrides .nav-btn inside map
           popups (higher specificity) — restore readable button text there. */
        .leaflet-popup-content a.nav-gmaps { color: #fff; }
        .leaflet-popup-content a.nav-waze { color: #06283d; }

        .msg { text-align: center; padding: 30px 15px; color: #666; font-size: 14px; }

        #map-view { padding: 0 15px 15px; }
        #map { width: 100%; height: 62vh; border-radius: 12px; border: 1px solid #e0e0e0; }
        .ev-pin {
            background: #14a3a3; color: #fff; font-size: 13px; line-height: 1;
            padding: 3px 4px; border-radius: 50%; border: 2px solid #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,.4);
        }
        .ev-pin.ev-available { background: #1faa4b; }
        .ev-pin.ev-busy { background: #dc3545; }
        .ev-pin.ev-down { background: #6b7280; }
        .ev-pin.ev-unknown { background: #9aa0a6; }
        .ev-status {
            display: inline-block; margin-bottom: 6px; font-size: 11px; font-weight: 700;
            padding: 2px 8px; border-radius: 6px; background: #f1f3f4;
        }
        .ev-status.ev-available { color: #1faa4b; background: #e9f7ee; }
        .ev-status.ev-busy { color: #dc3545; background: #fdecee; }
        .ev-status.ev-down, .ev-status.ev-unknown { color: #6b7280; }
        .price-pin {
            background: #007AFF; color: #fff; font-weight: 700; font-size: 12px;
            padding: 3px 6px; border-radius: 8px; white-space: nowrap;
            border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,.4); text-align: center;
        }
        .price-pin.cheap { background: #1faa4b; }
        .price-pin.dear { background: #dc3545; }
        .price-pin.noprice { background: #9aa0a6; }
        .price-pin.approx { border-style: dashed; opacity: 0.8; }
        .user-dot {
            width: 18px; height: 18px; border-radius: 50%;
            background: #1a73e8; border: 3px solid #fff; box-sizing: border-box;
            box-shadow: 0 0 0 rgba(26,115,232,.5); animation: userpulse 1.8s ease-out infinite;
        }
        @keyframes userpulse {
            0%   { box-shadow: 0 0 0 0 rgba(26,115,232,.55); }
            70%  { box-shadow: 0 0 0 16px rgba(26,115,232,0); }
            100% { box-shadow: 0 0 0 0 rgba(26,115,232,0); }
        }
        .leaflet-popup-content { margin: 10px 12px; font-size: 13px; }
        .popup-name { font-weight: bold; font-size: 15px; color: #333; }
        .popup-addr { color: #666; font-size: 12px; margin: 2px 0 4px; }
        .popup-price { color: #007AFF; font-weight: bold; }
        .popup-nav { display: flex; gap: 6px; margin-top: 8px; }

        .footer a { color: #0056b3; }
        .footer p { margin: 2px 0; }
        .footer {
            background: #f8f9fa; padding: 14px; text-align: center;
            border-top: 1px solid #e0e0e0; font-size: 12px; color: #666;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="change-banner" id="change-banner" style="display:none"></div>

        <div class="controls">
            <div class="topbar">
                <div class="action-bar" id="action-bar"></div>
                <div class="lang-switcher" id="lang-switcher"></div>
            </div>

            <div class="fuel-type-selector">
                <button class="fuel-btn active" id="btn-petrol95" onclick="selectFuel('petrol95')" data-i18n="btn_petrol95">⛽ Petrol 95</button>
                <button class="fuel-btn" id="btn-diesel" onclick="selectFuel('diesel')" data-i18n="btn_diesel">🚛 Dyzelinas</button>
                <button class="fuel-btn" id="btn-lpg" onclick="selectFuel('lpg')" data-i18n="btn_lpg">🔥 Dujos</button>
                <button class="fuel-btn ev" id="btn-ev" onclick="selectFuel('ev')">⚡ EV</button>
            </div>

            <div class="view-toggle">
                <button class="view-btn active" id="view-list" onclick="setView('list')" data-i18n="view_list">📋 Sąrašas</button>
                <button class="view-btn" id="view-map" onclick="setView('map')" data-i18n="view_map">🗺️ Žemėlapis</button>
            </div>

            <button class="locate-btn" id="locate-btn" onclick="locate()">📍 Rasti artimiausias prie manęs</button>

            <div class="filter-row">
                <select id="muni-select" onchange="render()"><option value="">Visos savivaldybės</option></select>
                <input class="search-input" id="search" type="text" placeholder="Ieškoti (tinklas, adresas)…" data-i18n-ph="search_ph" oninput="onSearchInput()">
            </div>
            <div class="sort-row">
                <span class="sort-label" data-i18n="sort_label">Rūšiuoti:</span>
                <button class="sort-btn active" id="sort-asc" onclick="setSort('asc')" data-i18n="sort_cheap">💰 Pigiausios</button>
                <button class="sort-btn" id="sort-desc" onclick="setSort('desc')" data-i18n="sort_dear">Brangiausios</button>
                <button class="sort-btn" id="sort-dist" onclick="setSort('dist')" data-i18n="sort_near" disabled>📍 Arčiausios</button>
            </div>
            <div class="radius-row" id="radius-row" style="display:none">
                <span class="sort-label" data-i18n="radius_label">Atstumas:</span>
                <button class="radius-btn" data-km="2" onclick="setRadius(2)">2 km</button>
                <button class="radius-btn" data-km="5" onclick="setRadius(5)">5 km</button>
                <button class="radius-btn" data-km="10" onclick="setRadius(10)">10 km</button>
                <button class="radius-btn" data-km="25" onclick="setRadius(25)">25 km</button>
                <button class="radius-btn active" data-km="0" onclick="setRadius(0)">∞</button>
            </div>
        </div>

        <div id="list-view">
            <div class="stations-container" id="stations-list">
                <div class="msg">Kraunama…</div>
            </div>
        </div>

        <div id="map-view" style="display:none">
            <div id="map"></div>
        </div>

        <div class="summary" id="summary"></div>

        <div class="oil-footer" id="oil-footer" style="display:none"></div>

        <div class="footer">
            <p id="source-line">Kraunama oficialūs duomenys…</p>
            <p id="updated-line"></p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="i18n.js"></script>
    <script src="app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () =>
          navigator.serviceWorker.register("service-worker.js").catch(() => {}));
      }
    </script>
</body>
</html>
