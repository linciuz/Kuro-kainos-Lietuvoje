name = "kk-reports"
main = "report-worker.js"
compatibility_date = "2024-11-01"

# Create the KV namespace once, then paste its id below:
#   npx wrangler kv namespace create REPORTS
# It prints an id like: { binding = "REPORTS", id = "xxxx…" }
kv_namespaces = [
  { binding = "REPORTS", id = "PASTE_KV_NAMESPACE_ID_HERE" }
]
